
<ul class="header" *ngIf="user">
    <li><a routerLink="/questions" routerLinkActive="active-link">Pitanja</a></li>
    <li><a routerLink="/titles" routerLinkActive="active-link">Titule</a></li>
    <li><a (click)="play()" routerLink="/play" routerLinkActive="active-link">Igraj</a></li>
    <li><a routerLink="/contribute" routerLinkActive="active-link">Dodaj</a></li>
    <li><a routerLink="/ranking" routerLinkActive="active-link">Top lista</a></li>
    <li><a routerLink="/profile" routerLinkActive="active-link">Profil</a></li>
</ul>

<div class="content" *ngIf="user">
    <div class="modal-play" [ngClass]="{'open': showModal}" *ngIf="showModal">
        <button (click)="closeModal()">Play</button>
    </div>
    <router-outlet></router-outlet>
</div>
