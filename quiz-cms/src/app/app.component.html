<div class="spinner" *ngIf="spinner">
    <h1>
        <p class="image"></p>
        <p class="loading-bar" [ngStyle]="{'width': loadingPercent + '%'}"></p>
        <p class="loading-text">Ucitava se</p>
    </h1>
</div>

<div class="content" [ngClass]="{'expand': !isLogged}">
    <div class="modal-game-results" [ngClass]="{'open': gameResults.showModal}" *ngIf="gameResults.showModal">
            <!--   RESULTS     -->
        <div *ngIf="gameResults.success && !gameResults.noQuestions" class="stars-results">
            <div class="stars-row">
                <img src="../assets/images/ic_star.png" *ngFor="let star of stars" />
            </div>
           
            <button class="wood-btn" (click)="onGameFinish()">Ok</button>
        </div>

        <div *ngIf="!gameResults.success && !gameResults.noQuestions">
            <h3>Niste osvojili poen, pokusajte ponovo</h3>
            <img src="../assets/images/new-theme/sad-emoji.png" width="200" height="200"/>
            <button class="wood-btn" (click)="onGameFinish()">Ok</button>
        </div>

        <div *ngIf="gameResults.noQuestions">
            <h3>Nema pitanja u bazi</h3>
            <button class="wood-btn" (click)="onGameFinish()">Ok</button>
        </div>
            <!--    /RESULTS     -->
    </div>
    <div class="user-header" *ngIf="isLogged">
        <div class="left-info">
            <a [ngStyle]="{'background-image': 'url(' + user.avatar_url + ')'}" routerLink="/settings"></a>
        </div>
        <div class="right-info">
            <p class="reset-timer" *ngIf="showLivesTimer && lives_timer_delay">{{ minutesString }}:{{secondsString}}</p>
            <p><span class="hearth-life" *ngFor="let life of lives"></span></p>
            <p class="user-chest"><span class="user-chest-icon {{resetAvailable}}"
                      (click)="resetAvailable && openDailyReward()"></span>
            </p>
            <p class="user-score"><span class="user-score-icon"></span><span>{{ user.score }}</span></p>
            <p class="user-ticket"><span class="user-ticket-icon"></span><span>{{ user.tickets }}</span></p>
        </div>
    </div>
    
        <div class="scrollable-area" [ngClass]="{'not-logged': !isLogged}">
            <div class="notification" *ngIf="showFeedback" [ngClass]="{'success' : successFeedback, 'error': !successFeedback, 'hide': animateBox}">
                <div class="wrapper">
                    <span>{{ feedbackMessage }}</span>
                    <button class="button-yellow-small" (click)="hideFeedback()">Ok</button>
                </div>
            </div>
            <div class="daily-reward-rulet" *ngIf="dailyModal">
                <p class="title">Dnevna nagrada</p>
                <div class="daily-items">
                    <p class="reward-item" [ngClass]="{'bordered': ticketReward === 3 || animateBorderOnNumbers([4,7,17])}"><img src="../assets/images/ic_ticket.svg" alt=""> x3</p>
                    <p class="reward-item" [ngClass]="{'bordered': ticketReward === 1 || animateBorderOnNumbers([1,9,13])}"><img src="../assets/images/ic_ticket.svg" alt=""> x1</p>
                    <p class="reward-item" [ngClass]="{'bordered': ticketReward === 5 || animateBorderOnNumbers([5,12,18])}"><img src="../assets/images/ic_ticket.svg" alt=""> x5</p>
                    <p class="reward-item" [ngClass]="{'bordered': ticketReward === 4 || animateBorderOnNumbers([2,8,16,19])}"><img src="../assets/images/ic_ticket.svg" alt=""> x4</p>
                    <p class="reward-item" [ngClass]="{'bordered': ticketReward === 10 || animateBorderOnNumbers([3,11,14])}"><img src="../assets/images/ic_ticket.svg" alt=""> x10</p>
                    <p class="reward-item" [ngClass]="{'bordered': ticketReward === 2 || animateBorderOnNumbers([6,10,15])}"><img src="../assets/images/ic_ticket.svg" alt=""> x2</p>

                </div>
               
                <button class="wood-btn" *ngIf="ticketAnimationCounter >= 20" (click)="closeDailyReward()">Ok</button>
            </div>
            <router-outlet></router-outlet>
        </div>
</div>
