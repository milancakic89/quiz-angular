

<div class="page-content">
    <div class="table">
        <div class="thead">
            <div class="tr">
                <div class="th w-10">#</div>
                <div class="th w-40">Pitanje</div>
                <div class="th w-20">Odgovor</div>
                <div class="th w-20">Status</div>
                <div class="th w-10">Opcije</div>
            </div>
        </div>
        <div class="tbody contribute">
            <div class="tr" *ngFor="let question of questions; let i = index"
                 (click)="question.opened = !question.opened">
                <div class="th w-10">{{ i }}</div>
                <div class="th w-40">{{ question.question_text }}</div>
                <div class="th w-20">{{ question.correct_text}}</div>
                <div class="th w-20">
                    <span [ngClass]="{
                        'approved': question.status === 'APPROVED',
                        'pending': question.status === 'PENDING',
                        'denied': question.status === 'DENIED'
                    }">{{question.status | titlecase}}</span>
                </div>
                <div class="th w-10">
                    <a class="delete-link">delete</a>
                </div>
                <div class="question-details" *ngIf="question.opened">
                    <p>Pitanje: {{ question.question_text }}</p>
                    <p><b>Tacan odgovor: {{ question.correct_text }}</b></p>
                    <p *ngFor="let answer of question.answers; let j = index">
                        Odgovor {{j + 1}}: {{ answer.answer_text }}
                    </p>
                </div>
            </div>
        </div>
    </div>
    
</div>
