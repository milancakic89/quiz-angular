

<div class="page-content">
    <div class="navigation">
            <a class=button-back routerLink="/profile"><i class="fas fa-backward"></i></a>
            <a class="button-contribute" routerLink="/contribute">+</a>
            <div class="filters">
                <ng-select [items]="filters"
                           bindLabel="title"
                           bindValue="value"
                           [clearable]="false"
                           [(ngModel)]="selectedFilter"
                           (ngModelChange)="load()">

                </ng-select>
            </div>
    </div>

    <div class="table questions-table">
        <div class="thead">
            <div class="tr">
                <div class="th w-40">Pitanje</div>
                <div class="th w-20">Odgovor</div>
                <!-- <div class="th w-20 th-last">Opcije</div> -->
            </div>
        </div>
        
        <div class="tbody contribute">
            <div class="tr" *ngFor="let question of questions; let i = index">
                <div data-label="Pitanje" class="td w-40" (click)="question.opened = !question.opened">{{ question.question }}</div>
                <div data-label="Odgovor" class="td w-20 answer-text">{{ question.correct_text}}</div>
                <!-- <div data-label="Opcije" class="td w-20 th-last">
                    <span class="publish" [ngClass]="{
                        'denied': question.status === 'ODOBRENO',
                        'approved': question.status === 'NA CEKANJU'}" 
                             (click)="question.status === 'NA CEKANJU' ? publish(question._id) : unpublish(question._id)">
                             {{ question.status === 'NA CEKANJU' ? 'PRIHVATI' : 'ODBIJ' }}
                    </span>
                    <a class="delete-link" (click)="onDeleteQuesion(question._id)">obrisi</a>
                </div> -->
                <div class="question-details" *ngIf="question.opened">
                    <p class="yellow-text">Pitanje: {{ question.question }}</p>
                    <textarea type="text" [(ngModel)]="updateQuestion" name="update"
                            [placeholder]="question.question"></textarea>
                        <button (click)="updateQuestionText(question._id)">Posalji izmenu</button>
                    <p class="blue-text"><b>Tacan odgovor: {{ question.correct_text }}</b></p>
                    <p class="blue-text" *ngIf="question.type === 'PICTURE'"><b>iMAGE: <a [href]="question.imageUrl">{{ question.imageUrl }}</a></b></p>
                    <p class="yellow-text" *ngFor="let answer of question.answers; let j = index">
                        Odgovor {{j + 1}}: {{ answer.text }}
                    </p>
                </div>
            </div>
        </div>
    </div>
    
</div>
