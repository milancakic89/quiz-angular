<div class="room-results">
    <button class="button button-yellow-medium" (click)="onFinish()">Nazad</button>
    <button class="button button-yellow-medium" (click)="onFinishTest()">Nazad test</button>
    <div class="user" *ngFor="let player of results">
        <p>{{ player.name}}</p><p>{{ player.score}}</p>
    </div>
</div>
