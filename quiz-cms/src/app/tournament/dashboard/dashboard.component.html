<div class="tournaments">
    <div class="navigation">
        <a class=button-back routerLink="/play"></a>
    </div>
    <div class="dropdown-menu" [ngClass]="{'close': clicked}">
            <button (click)="createRoom()" class="button-yellow">Kreiraj Turnir</button>
            <button (click)="roomInput = !roomInput" class="button-yellow">Udji na turnir</button>
            <div *ngIf="roomInput">
                <form #roomform="ngForm" (ngSubmit)="roomform.valid && joinRoom()">
                    <input name="roomName" type="text" required [(ngModel)]="enterRoom" />
                    <button type="submit">Udji na turnir</button>
                </form>
            </div>
            <button class="button-yellow">Globalni turniri</button>
    </div>
</div>
