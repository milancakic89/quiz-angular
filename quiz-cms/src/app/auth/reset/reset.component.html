<div class="login">
    <div class="login-form-wrapper">
        <h4 class="color-white logo">{{ title }}</h4>
        <form class="login-form" #resetForm="ngForm" (submit)="resetForm.valid && onSubmit()">
            <div class="form-row column">
                    <label class="color-white">Enter email to reset password</label>
                    <input name="email" 
                           type="email"
                           pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+"
                           [(ngModel)]="email"
                           required
                           [ngClass]="{'form-submitted': resetForm.submitted}" />          
                    <button class="button-submit" name="submit" [ngClass]="{'button-gray': resetForm.invalid}">Resetuj</button>
                    <div class="nav-buttons">
                        <a routerLink='/' class="login-nav-link">Uloguj se</a>  
                    </div>
                   
            </div>
        </form>
    </div>
</div>
