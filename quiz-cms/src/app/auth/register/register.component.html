<div class="login">
    <div class="login-form-wrapper">
        <h4 class="color-white logo">{{ title }}</h4>
        <form class="login-form" #registerForm="ngForm" 
             (submit)="registerForm.valid && register.password === register.repeatPassword && onSubmit()">
            <div class="form-row column">
                    <label class="color-white">Email</label>
                    <input name="email" 
                           type="email"
                           pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+"
                           [(ngModel)]="register.email"
                           required
                           [ngClass]="{'form-submitted': registerForm.submitted}" />   
                    <label class="color-white">Lozinka</label>
                    <input name="password" 
                           required
                           [min]="6"
                           placeholder="Minimum 6 chars"
                           type="password"
                           [(ngModel)]="register.password"
                           [ngClass]="{'form-submitted': registerForm.submitted}"/>
                    <label class="color-white">Ponovi lozinku</label>
                    <input name="repeatPassword" 
                           required
                           [min]="6"
                           type="password"
                           [(ngModel)]="register.repeatPassword"
                           [ngClass]="{'form-submitted': registerForm.submitted}"/>
                   
                    <button class="button-submit" 
                            name="submit" 
                            [ngClass]="{'button-gray': registerForm.invalid || register.password !== register.repeatPassword}">Nastavi</button>
                            <div class="nav-buttons">
                                <a routerLink='/' class="login-nav-link">Uloguj se</a>
                            </div>
                            
            </div>
        </form>
    </div>
</div>
