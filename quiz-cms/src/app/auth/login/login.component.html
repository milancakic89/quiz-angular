<div class="login">
    <div class="login-form-wrapper dropdown-menu">
        <h4 class=" logo">{{ title }}</h4>
        <form class="login-form" #loginForm="ngForm" (submit)="loginForm.valid && onSubmit()">
            <div class="form-row column">
                  
                    <div class="wood-btn">
                        <label class="">Email</label>
                    </div>
                    <div class="wood-btn mb-20">
                        <input name="email" 
                        type="email"
                        pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+"
                        [(ngModel)]="login.email"
                        required
                        [ngClass]="{'form-submitted': loginForm.submitted}" /> 
                    </div>
                    <div class="wood-btn">
                        <label class="">Password</label>
                    </div>
                    <div class="wood-btn mb-20">
                        <input name="password" 
                        required
                        type="password"
                        [(ngModel)]="login.password"
                        [ngClass]="{'form-submitted': loginForm.submitted}"/>
                    </div>
  
                 
               
                          
                    <button class="wood-btn submit" name="submit" [ngClass]="{'button-gray': loginForm.invalid}">Submit</button>
                    <div class="nav-buttons">
                        <a routerLink='/register' class="wood-btn link">Register</a>  
                        <a routerLink='/reset' class="wood-btn link">Reset password</a> 
                    </div>
            </div>
        </form>
    </div>
</div>
