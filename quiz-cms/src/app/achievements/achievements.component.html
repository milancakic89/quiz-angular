<div class="achievements" *ngIf="user">
    <div class="navigation">
        <a class=button-back routerLink="/profile"><i class="fas fa-backward"></i></a>
    </div>
    <box-item *ngFor="let achievement of achievements"
              [description]="achievement.category"
              class="achievement"
              [title]="achievement.achiveText"
              [answered]="achievement.answered"
              [achivedAt]="achievement.achievedAt"
              theme="blue"></box-item>
</div>
