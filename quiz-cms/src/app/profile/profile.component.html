<div class="profile">
    <div class="dropdown-menu" [ngClass]="{'close': clicked}">
            <button (click)="onClick('/play')" class="wood-btn">Igraj</button>
            <button (click)="onClick('/questions')" class="wood-btn">Pitanja</button>
            <button (click)="onClick('/achievements')" class="wood-btn">Dostignuca</button>
            <button (click)="onClick('/ranking')" class="wood-btn">Tabela</button>
            <button (click)="logout()" class="wood-btn">Izloguj se</button>
    </div>
    <!-- <div class="animation"></div> -->
</div>
