<div class="play-new" *ngIf="showModal && lives > 0">
    <a class=button-back routerLink="/profile"><i class="fas fa-backward"></i></a>
    <div class="box-item geography" (click)="closeModal()">
        <div>
             <span class="title">Geografija</span>
        </div>
    </div>
    <div class="box-item history locked" data-unlock="Otvoreno nakon 10 dodatih pitanja iz Geografije">
        <div>
             <span class="title">Istorija</span>
        </div>
    </div>
    <div class="box-item movies locked" data-unlock="Otvoreno nakon 10 dodatih pitanja iz Istorije">
        <div>
             <span class="title">Filmovi i serije</span>
        </div>
    </div>
    <div class="box-item celebrity locked" data-unlock="Otvoreno nakon 10 dodatih pitanja iz Filmova i serija">
        <div>
             <span class="title">Poznate licnosti</span>
        </div>
    </div>
    <div class="box-item sport locked" data-unlock="Otvoreno nakon 10 dodatih pitanja Poznatih licnosti">
        <div>
            <span class="title">Sport</span>
        </div>
    </div>
    <div class="box-item others locked" data-unlock="Otvoreno nakon 10 dodatih pitanja iz Sporta">
        <div>
            <span class="title">Pitanja drugih takmicara</span>
        </div>
    </div>
    <!-- <div class="modal-play open">
        <button (click)="closeModal()">Igraj</button>
    </div> -->
</div>
<div class="play-new" *ngIf="showModal && lives === 0">
    <div class="modal-play open">
        <h1>Nemate vise pokusaja</h1>
    </div>
</div>
<div class="play" *ngIf="!showModal && lives > 0">
    <div class="time-and-score">
        <span>Rezultat: <b>{{ score }}</b></span>
        <span>Vreme: <b>{{ time }}</b></span>
        <span>Promasaji: <span *ngFor="let attempt of attempts" class="attempt"></span> </span>
    </div>
    <div class="question-wrapper" *ngIf="question">
        <div class="question-box" [ngClass]="{'disabled-question':questionSelected}">
            <h5>
                {{ question.question }}
            </h5>
        </div>
        <div class="buttons-box" *ngIf="question">
            <button class="answer-button"
                    *ngFor="let answer of question.answers"
                    [ngClass]="{'disabled-button':questionSelected,
                    'wrong-answer': questionSelected && question.correct_letter !== answer.letter && selectedLetter === answer.letter,
                    'correct-answer': question.correct_letter === answer.letter && selectedLetter === answer.letter}" 
                    [attr.data-label]="answer.letter" 
                    (click)="!questionSelected && onSelectedAnswer(answer)">
                         {{ answer.text }}
            </button>
        </div>
    </div>
</div>
