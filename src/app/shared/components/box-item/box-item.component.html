<div class="box-item-wrapper {{ theme }} {{ class }}" [ngClass]="displayGray ? 'gray' : ''" (click)="onClick.emit()">
    <div class="completed-percent" [ngStyle]="{'width': completed + '%'}"></div>
    <p class="box-item-description">{{ description }}</p>
    <div class="box-item-title">
        <p class="box-item-title-btn">{{ title }}</p>
    </div>
</div>
