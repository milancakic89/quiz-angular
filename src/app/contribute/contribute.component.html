
<div class="page-content modal-contribute" *ngIf="questionType === 'MODAL'">
    <div class="banner">
        <h5>Postavite pitanje drugim takmicarima</h5>
    </div>
    <div class="flex-wrapper pick-category">
        <button class="button-primary" title="Samo pitanje sa odgovorom" (click)="changeType('REGULAR')">Text pitanje</button>
        <button class="button-primary" title="Sa slikom" (click)="changeType('PICTURE')">Pitanje sa slikom</button>
        <button class="button-primary" disabled title="Sa slovima">Pitanje sa slovima (uskoro)</button>
    </div>

</div>
